name: DemiseMaces
version: '${version}'
main: com.github.jiten.demisemaces.DemiseMaces
api-version: '1.21'
author: jiten
description: A modern Paper plugin for custom Mace mechanics.
commands:
  demisemaces:
    description: Main command for DemiseMaces.
    permission: demisemaces.admin
    usage: /<command>
permissions:
  demisemaces.admin:
    description: Allows giving custom maces
    default: op
